services:
  telegram-bot-api:
    build:
      context: .
      dockerfile: docker/telegram-bot-api/Dockerfile
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?TELEGRAM_API_ID is required}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?TELEGRAM_API_HASH is required}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_HTTP_PORT: "8081"
      TELEGRAM_HTTP_IP_ADDRESS: "0.0.0.0"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TELEGRAM_LOCAL_MODE: "true"
      TELEGRAM_API_BASE_URL: http://telegram-bot-api:8081/bot
      TELEGRAM_MAX_UPLOAD_SIZE_MB: "2000"
      DOWNLOAD_MAX_SIZE_MB: "2000"
      DOWNLOAD_MAX_SIZE_GENERIC_MB: "2000"
      TELEGRAM_API_TIMEOUT: "120"
      TEMP_DIR: /tmp/bot_temp
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  telegram-bot-api-data: